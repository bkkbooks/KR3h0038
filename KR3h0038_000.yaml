body:
  text: 提要衍極二卷藝術類一書畫之屬臣等謹案衍極二卷元鄭枃撰案何喬逺閩書曰枃字子經羅源人㤗定中官南安縣教諭與陳旅為文字友著衍極五篇衍極記載三篇其書自倉頡迄元代凡古文籀以及書法之變皆在所論宣撫使齊伯亨採而上之作衍極堂以蔵其書陶宗儀書史㑹要又稱其能大字兼工八分盖究心斯藝故能析其源流如是也其書載永樂大典中而缺其記載三篇别本又載有學書次第書法源流二圖永樂大典亦缺然别本字句訛脱文注混淆不及永樂大典之精善謹合兩本叅校補遺正悞復還舊觀其注為劉有定所作有定字能靜號原範莆田人其名載林承霖莆陽詩編亦見書史㑹要葢亦文雅之士云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀衍極原序書道其大矣斯文興焉世之學者往往務談髙虛謂書非儒道之要而遂小之軌所以行車也車行而毁其軌可乎水所以行舟也舟行而廢其水可乎予南游至無諸城見莆田鄭君子經所著衍極五篇雄文卓論璀錯玢豳如觀三代器物不可名狀軋芴澶曼如行洞庭之野不見首尾夷考其說然後知子經得絶學於數千百載之後曠世竒作也書道其大矣又嘗即其言而求其為人為之廢書而歎曰士之負材抱藝莫不欲有為也修名未立老冉冉其將至平居里巷相接又無足與語以發舒其所負抱者慨古道之浸邈憤俗尚之益乖乃悠然獨往自託於著書以鳴其所不能自已者此衍極之為言所以怫鬱而歔欷也觀是書者又不能無所感云延祐七年庚申秋九月朔旦京口李齊仲思序
