body:
  text: 衍極卷上元鄭枃撰劉有定注至朴篇至朴散而八卦興八卦興而書契肇書契肇而篆籀滋河出圖洛出書聖人則之以畫八卦而書之文卩具上古結繩而治後世易之以書契而書之用遂行周官保氏教國子以六書而書之法始備古文籀變而至於隸草而書之體滋廣矣飛天八會已前不可得而詳也書之本始有三元八會羣方飛天之書又有八龍雲篆明光之章逮三皇之世演八會之文為龍鳯之章拘省雲之迹以為順形梵書分破二道壞真從易配别本支為六十四種之書事不經見悉從刪略按此注本陶宏景記仙書原本訛字甚多今依真誥原文改正皇頡以降凡五變矣謂古文籀隸草按秦滅古文書有八體一曰大篆二曰小三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書王莾使甄豐校文字部改定古文復有六書一曰古文孔氏壁中書也二曰竒字即古文而異者三曰書秦也四曰佐書即隸書也五曰繆篆所以摹印也六曰鳥書所以書幡信也唐六典校書郎正字掌讎校典籍刋正文字其體有五一曰古文廢而不用二曰大篆三曰小四曰蟲書即鳥書以刻印璽書幡碣五曰隸書謂典籍表奏及公私文疏所用宋鄭昂論文字之大變有八一曰古文二曰大三曰小四曰隸書五曰八分六曰行書七曰飛白八曰草書其餘諸體以類相從為得之然以八分行書飛白各自為變蓋不知文字之大變也其人亡其書存古今一致作者十有三人焉謂蒼頡夏禹史籀孔子程邈蔡雍張芝鍾繇王羲之李陽氷張旭顔真卿蔡襄也李斯以得罪名教故黜之嗚呼自書契以來傳記所載能書者不少而衍極之所取者止此不有卓識其能然乎豫生千載之下每覽昔人殘銘斷碣未嘗不為之歔欷而三嘆也在昔結繩之政始分龍穗之章中輟太皥之時龍馬負圖出於榮河帝則之畫八卦以龍紀官乃命飛龍朱襄氏造六書於是始有龍書左氏曰太皥氏以龍紀故為龍師而龍名是也神農氏始為耒耜教民稼穡感上黨羊頭山生嘉禾一本八穗帝異之作穗書於是蒼史氏出仰觀俯察以造六書通天地之幽祕為百王之憲章非天下之至精其孰能與於此蒼史黃帝之史蒼頡也亦曰皇頡姓侯剛氏首四目通於神明仰觀奎星屈曲之象俯察龜文鳥迹之竒博採衆美與沮誦廣伏犧之文造六書是為古文其冢在馮翊彭衙利陽亭南道旁學書者祭之不絶北海亦有蒼頡藏書臺人得其書莫之能識秦李斯識其八字曰上天作命皇辟迭王漢叔孫通識其十二字今法帖中有二十八字云按造六書三字原本誤作正文今改正若稽古大禹既平水土鑄鼎象物勒銘告成而功被萬世禹命九牧貢金鑄九鼎象神姦使民知備故有象鍾鼎形書勒銘於天下名山大川韓文公所謂岣嶁山碑其一也今廬山紫霄峯上有禹鑿石繫舟之所磨崖為碑皆科斗文字隱隱可見張懷瓘曰向在翰林見古銅鍾二髙兩尺許有古文二百餘字紀夏禹功迹皆紫金鈿似大篆神采驚異又有雕戈銘六字鉤帶銘三十三字皆細紫金為文讀之不能盡曉薛尚功諸人以為夏禹時書法帖亦有禹書十二字三代之末周籀直又反蔚有竒秀篆隸攸祖籀周宣王柱下史也損益古文或同或異加之銛利鉤殺自然機發為大十五篇以其名顯故謂之籀書以其官名故漢書謂之史書以别小故謂之大篆甄豐六書二曰竒字即古文而異者蓋籀書也法帖中有其迹孔子採托舊作緣飾篆文天授其靈創物垂則六經之文遭秦焚滅故世不可復見魯恭王壞孔子舊宅於壁中得古文尚書及傳論語孝經皆科斗文字蓋仲尼門人所録今孔子書傳於世者比干盤銘季札墓碣法帖所載十二字比干墓在衛州汲縣開元中遊武之竒耕地得銅盤有文曰左林右泉後岡前道萬世之寧兹焉是寶乃比干墓銘也季札碑曰嗚呼有吳延陵季子之墓與古文異而迹類大在潤州延陵鎮吳季子冢廟歷代綿逺其文殘缺人勞應命石遂堙埋開元中元宗勑殷仲容模榻其本大歷十四年潤州刺史蕭定重刋于石吕政暴興天人之道壞亂極矣李斯者適際其時陶誕偃仰按四字未詳疑誤専名擅作悉燔舊章天下行秦篆矣李斯上蔡人相秦始皇滅六國參古文復籀書頗加省改作小著蒼頡篇九章世謂之玉筯始皇上鄒嶧山議刻石頌秦德及二世諸碑是也初周末諸侯交爭七國分裂文字異形莫相統紀始皇一天下李斯欲專其名乃奏同之而罷其不與秦文合者獨存大兼行又奏始皇請史官非秦記非博士官所職天下敢有藏詩書百家語者悉詣守尉燒之有敢偶語詩書者棄市以古非今者族令下三日不燒黥為城旦所不去者醫藥卜筮種樹之書尋又使御史悉案問諸生轉相告引始皇乃除犯禁者四百六十餘人皆坑之咸陽程邈亦參定篆文增衍隸佐趨時便宜程邈字元岑下邽人與李斯等參定文後得罪始皇幽繫雲陽獄邈於獄中覃思十年變易大小篆為隸書三千字奏之始皇出之以為御史又同時上谷王次仲亦增廣隸書班固謂起於官獄多事苟趨簡易而無點畫俯仰之勢為其徒隸所作故曰隸書亦曰佐書漢建初中以隸書為楷法言其字方於八分有模楷也蔡雍鴻都石經為今古不刋之典張芝鍾繇咸得其道蔡雍字伯喈東漢陳留圉人官至左中郎將善大小隸八分飛白初入嵩山學書於石室中得素書八角垂芒頗似寫史籀李斯用筆勢雍得之讀誦三年遂通其理又採曹喜之法初秦時王次仲以古書方廣少波飾隸為八分雍祖述之筆訣尤妙嘗居一室不寐恍然一客厥狀甚異授以九勢言訖而沒故雍用筆特異當時善書者膺服之獻帝時為郎中讎書東觀奏正定經籍雍乃八分書丹刻於太學碑凡四十六後人咸取正焉伯英聖於一筆書伯英張芝字東漢燉煌酒泉人以有道徴不至善隸行草又妙於作筆見蔡雍筆勢遂作筆心五篇初漢元帝時黃門令史遊作急就章一篇解散隸體粗書之損隸之規矩存字之梗槩本草創之義謂之草書以别今草故謂之章草杜度崔瑗並善之杜氏冇氣力而微瘦崔氏清潤而工妙不及伯英重以省繁飾之銛利加之奮逸首出常倫又出意作今草書其草書急就章皆一筆而成氣脈通達行首之字往往繼其前行家之衣帛書而後染臨池學書水為之黑元常神妙於銘石元常鍾繇字魏頴川長杜人官至太傅師胡昭學書十六年不窺園見張芝筆心遂作筆骨論又從劉德升入抱犢山學書後與魏太祖邯鄲淳韋誕孫子荆關枇杷議用筆因見蔡雍筆法於誕苦求不與痛恨嘔血太祖以五靈丹救之誕死繇令人發其墓遂得蔡氏法一一從其消息繇書有三體一曰銘石謂正書二曰章程謂八分三曰行押謂行書三體皆世所推自言最妙者八分有隼尾之勢然其真書絶世剛柔備焉點畫之間多有異趣可謂幽深無際古雅有餘秦漢以來一人而已王羲之有髙人之才一發新韻晉宋能人莫敢讎擬羲之字逸少晉人為右將軍會稽內史稱疾去於父母墓自誓終身不仕贈金紫光祿大夫加常侍羲之善小隸行草八分飛白七嵗能書年十二於父曠枕中見衛夫人所傳蔡雍筆法竊而讀之書遂大進衛夫人見之流涕曰此子必蔽吾書名羲之後學李斯曹喜蔡雍石經梁鵠八分鍾繇等書張旭華嶽碑始知學衛夫人徒費日月又言自於山谷中臨學鍾氏及張芝正書草書草餘年竹葉樹皮山石之上及板木等不可知數至於素紙箋縠藤紙或反覆書之盡心精作得意轉深有言所不能盡者子獻之繼其學與父齊名薑氏曰右軍書成而漢魏西晉之風盡廢右軍固新竒可喜而古法之廢實自右軍始亦可恨也李陽冰魚陵反作筆陵反非生於中唐獨蹈孔軌潛心改作過於秦斯李陽冰字少溫趙郡人官至將作監初學李斯嶧山碑及見仲尼書開闔變化如虎如龍徑利豪爽風行雨集遂極其妙識者謂為蒼頡後身大歷初灞上人耕地得石亟中有絹素古文科斗孝經凡二十章初傳李白白授陽冰盡通其法嘗上李大夫曰陽冰志在古殆三十年見前人遺迹美即美矣惜其點畫但偏旁摹刻而已常痛孔壁遺文汲冢舊簡年代浸逺謬誤遂多天將未喪斯文故小子得篆籀之宗旨誠欲刻石作篆備書六經立於明堂號曰大唐石經使百代之後無所損益死無恨矣張旭天分極深渾然無迹張旭字伯髙蘇州吳人仕唐為右率府長史嗜酒善楷隸尤工草書每大醉呌呼狂走乃下筆或以頭濡墨而書既醒自視以為神異不可復得也自言始見公主擔夫爭路而得其意又聞鼓吹而得其法又觀公孫大娘舞劒器而得其神旭嘗與裴旻吳道子相遇於洛下各陳其能裴舞劒一曲張草書一壁吳畫一壁時人以為一日獲覩三絶唐文宗詔以李白歌詩裴旻劒舞張旭草書為三絶顔真卿含宏光大為書統宗其氣象足以儀表衰俗顔真卿字清臣琅邪臨沂人師古五世從孫仕唐為尚書右丞封魯公贈太師善楷書行草蓋古書法晉唐以降日趨姿媚至徐沈輩幾於掃地矣而魯公蔚然雄厚獨雅有先秦科斗籀隸之遺意焉五代而宋奔馳崩潰靡所底止初蔡雍得書法於嵩山以授崔實及其女琰張芝之徒咸受業焉魏初韋誕得之祕而不傳鍾繇令人掘韋誕墓得蔡氏法將死授其子會宋翼繇之甥也學書於繇繇弗告也晉太康中有人破鍾公冡翼始得之魏晉間衛氏三世能書衛覬與其子瓘及見胡昭韋誕鍾繇瓘及子恆俱學於張芝恆從妹衛夫人親受於蔡琰衛與王世為中表故羲之父曠得之曠以授羲之羲之傳其子獻之及王濛之子修故諸王世傳家法獻之傳其甥羊欣欣傳王僧虔僧虔傳蕭子雲晉宋而下能者頗多其流皆出於二王也隋釋智永羲之九世孫也頗能傳其學又親受法於子雲虞世南親見永師故其法復傳於唐焉歐陽詢得於世南禇遂良親師歐陽或云虞禇同師史稜稜隋人也歐陽詢傳陸柬之柬之及見永師又世南之甥也陸傳子彥逺彥逺傳張旭彥逺張之舅也旭又得禇遂良餘論以授顔真卿李陽冰徐浩韓滉塢彤魏仲犀韋玩崔邈等二十三人釋懷素聞於塢彤柳公權亦得之其流實出永師也徐浩傳子璹及皇甫閲崔邈傳禇長文韓方明受法於璹及邈皇甫閲傳柳宗元劉禹錫楊歸厚歸厚傳姪緯緯傳權審張藂崔宏裕宏裕禹錫外孫也宏裕傳盧潛潛傳頴頴傳崔紓柳宗元傳房直溫有劉埴者亦得一鱗半甲歐陽永叔曰余嘗與蔡君謨論書以謂書之盛莫盛於唐書之廢莫甚於今余之所録如于頔髙駢下至楷書手陳遊瓌等皆有之蓋唐之武夫悍將暨楷書手輩字皆可愛今文儒之盛其書屈指可數者無三四人爾蔡襄毅然獨起可謂間世豪傑之士也蔡襄宋仁宗賜字曰君謨興化人官至端明殿學士諡忠惠善𨽻楷飛草行草嘗言鍾王索靖法相近張芝又離為一法今書有規矩者本王索其雄逸不常者本張也初蔡雍待詔鴻都門見役人以堊帚成字恱而作飛白書君謨祖述以散筆作草謂之散草亦曰飛草自言每落筆為飛草但覺煙雲龍蛇隨手運轉奔騰上下殊可駭愕靜而觀之神情歡欣亦復可喜宋徽宗曰蔡君謨書包藏法度停蓄鋒鋭宋之魯公也蘇子瞻曰君謨天資既髙積學深至心手相應變化不窮為宋朝第一嗚呼書其難哉書其難哉文籍之生久矣能書者何闊稀焉蓋夫人能書也吾求其能於夫人者是以難也今豫得其人而不表章之使來者知所取則以至乎書道之妙豫則有罪也厥今區夏同文奎壁有爛異能間作黼黻皇猷三代以還莫此為盛大比之制已興保氏之教必立周官大司徒以鄉三物教萬民而賔興之一曰六德知仁聖義中和二曰六行孝友睦姻任恤三曰六藝禮樂射御書數鄉大夫以嵗時入其書三年則大比考其德行道藝而興賢者能者保氏掌養國子以道教之六藝一曰五禮二曰六樂三曰五射四曰五御五曰六書六曰九數草茅論著或者有取焉爾書要篇六書之要其諧聲乎聲原於虛而妙於物言者聲之宣也書者聲之寄也飛龍肇音漻哉閴乎其罔聞也六書一曰象形二曰指事三曰會意四曰諧聲五曰假借六曰轉注飛龍見上篇注夾漈山人嘗是正之有音無文者多矣夾漈姓鄭名樵字漁仲興化人鄭回溪之諸父也隱於夾漈山著書十類凡五十種千餘卷六經各有傳備載先生所著書目今子經家藏又有易説正隆官制養生等略十餘種皆書目所未載者宋南渡初先生以布衣召對上所著書於官詔藏之祕省命以官不拜乞還山令所在給筆札著通志三年然後成就總二百卷內有六書七音金石等二十略其七音序曰漢人課籀隸始為字書以通文字之學江左競風騷始為韻書以通聲音之學然漢儒識文字而不識子母則失制字之旨江左之儒識四聲而不識七音則失立韻之源獨體為文合體為字漢儒知以説文解字而不知文有子母生子為母從母為子子母不分所以失制字之旨四聲為經七音為緯江左之儒知縱有平上去入為四聲而不知衡有宫商角徴羽半徴半宫為七音縱成經衡成緯經緯不交所以失立韻之源七音之韻起自西域流入諸夏梵僧欲以其教傳之天下故為此書雖重百譯之逺一字不通之處而音義可傳華僧從而定之以三十六字為之毋重輕清濁不失其倫天地萬物之音備於此矣雖鶴唳風聲雞鳴狗吠雷霆驚天蚊虻過耳皆可譯也况人言乎臣初得七音韻鑑一唱三嘆胡僧有此妙義而儒者未之聞及乎研究制字考證諧聲然後知皇頡史籀之書已具七音之作先儒不得其傳耳今作諧聲圖以明古人制字通七音之妙又述內外轉圖以明胡僧立韻得經緯之全雖七音一呼而聚四聲不召自來此其粗淺者耳至其紐躡杳冥盤旋寥廓非心樂洞融天籟通乎造化者不能造其間也皇元國書重啓人文諧聲之義實綜乎五蒙古書具六書之義而以諧聲為主也雖古之三皇龍書穗書雲人諸作蔑以加諸猗與休哉商之倒薤周之虎書魚書其象形邪問商周書曰夷考禽書龜鸞諸體不過象物而作也龍穗見上篇注雲書黃帝之世卿雲常見因為雲書以雲紀官故為雲師而雲名又遊扈水之上靈龜負圖而至帝嘉其應作龜書或曰唐堯時外國進一巨龜背闊三尺上有科斗文記開闢以來堯命作龜歷焉又云落龜負圖禹觀而得九疇之文鸞鳯書少皥之立也鳯鳥適至故紀於鳥為鳥師而鳥名其文章衣服皆取以為象故有鸞鳯書自顓頊以來不能紀逺乃紀於近為民師而命以民事其車服書器有仙人之形因為人書或云帝嚳髙辛氏所制李斯善辨文字改為書謂之仙人科斗書者出於古文因科斗之名又飾之以形不知所起或云顓頊髙陽氏所制鍾鼎書夏禹作倒薤書商湯之師務光避天下於清泠之淵植薤而食輕風時至見其積葉交偃而為倒薤書王愔曰倒薤書小法也或云漢曹喜為之蓋古法喜以小書之也虎書禽書魚書皆史佚所作佚文王之史歷事武王成王當文王時周家忠厚仁及草木有獸曰騶虞白質元章馴於靈囿不踐生草於是佚錯綜其體而作虎書又鸑鷟鳴於岐赤雀集於户至武王時火流於王屋化為烏佚乃并狀鳥瑞而作禽書及武王伐紂師渡孟津白魚入於王舟王取以燎故佚又作魚書體魚之首為乙尾為丙以紀其瑞焉麒麟書魯哀公十四年春西狩獲麟孔子作春秋絶筆於獲麟弟子作書以申素王之瑞轉宿宋景公時熒惑躔於宋野景公懼而修德熒惑退舍國富民康於是司馬子韋作轉宿象蓮花未開形蠶書魯秋胡子逺宦三年不歸其妻幽居懷思因玩蠶而作芝英書初六國時各以異體僭為符信而芝英書興焉秦焚典籍其文遂滅至漢武帝時産靈芝於宣房既作芝房之歌又述其事而作此書氣候直時書漢司馬相如妙辨六律測尋二氣采日辰之禽屈伸其體升降其勢象四時之氣為之興降象形焉又後漢東陽公徐安子搜諸史籍得十二時書皆象神形也蛇書魯人唐綜當漢魏之交夢蛇繞身寤而狀之瑞華書南齊武帝於永平二年春二月覩落英茂木而作此書為辭紀之黃門侍郎何允明於圖緯以為木德之瑞纂其辭藏之王府凡若此類皆象形書按又飾之以形上墨藪有因科斗之名五字原本脫去今增入曰孔壁舊書皆科斗文字佳城之文獨顯於世問孔壁書見上篇注佳城文前漢夏侯嬰掘地得石槨有銘以示叔孫通通曰科斗書也其文曰佳城鬱鬱三千年見白日呼嗟滕公居此室曰古文雜用籀體非一於科斗也蒼頡之初龍穗書專行於世其文章簡要書用一體史籀既修篆之後雲鸞等作皆未嘗廢然文字日繁必錯綜雜體而書之或有專體如佳城文之比皆非連篇纍簡故可以存古不變至若孔壁之六經其辭不可謂不多矣豈得專以科斗書書之書序曰於壁中得古文尚書及傳論語孝經皆科斗文字者蓋史籀之書秦尚兼行獨古文廢已久時人罕知間有一二科斗文尤為難辨舉其所難故總而謂之皆科斗文字耳蓋古文有填書麒麟鍾鼎古文之別十七曰龍曰穗曰龜曰雲曰鸞鳯曰人曰科斗曰鍾鼎曰倒薤曰虎曰禽曰魚曰麒麟並見上注曰填書周媒氏以仲春之月判合男女以書納采之文魏文帝使韋誕以題芳林苑中樓觀晉王廙王隱並好之隱以為字間滿密故謂之填書曰金錯書古之泉銘也或云以銘金石故謂金錯梁劉之遴好古在荆州聚古器數百種有一器似甌可容一斛上有金錯字時人無能識者曰霹靂書唐開元中漳泉分界兩訟不均臺省不能斷俄而雷雨霹靂崖壁中裂所爭之地拓為一徑中有古文六行貞元中李協辨之曰漳泉兩州分地不平永安龍溪山髙水清千年不惑萬古作程又泉州南山有潭元和中雷霆劈石壁鑿成文字人無識若或寫以示韓愈愈曰科斗書也其文曰詔赤黑示之鯉魚天公車殺人壬癸神書急急蓋帝命戮蛟螭之辭曰天竺書梵土所作顔師古云西域胡僧能以十四字貫一切音文省而義廣謂之婆羅門書篆有垂露復書雜體書之別十五曰尚方大籀書也曰復亦籀所作因大而重復之其法類夏漢武帝以題建章鳯闕曰殳書伯氏所職文記笏武記殳因而掣之銘周時作曰傳信鳥書六國時書節為信象鳥首也亦曰蟲書曰刻符書鳥首雲腳李斯趙髙並善之用題印璽曰蕭籀漢相蕭何作曰署書秦之八體書也蕭何以題蒼龍白虎二闕曰鶴頭書曰偃波書俱詔板所用漢則謂之尺一簡髣佛鶴頭故名鶴頭書其偃波書即詔板下鶴頭纎亂者也狀若連波故謂之偃波曰蚊腳書尚書詔板用之其字體側纎垂下有似蚊腳曰轉宿篆曰蠶書曰芝英書曰氣候直時書曰蛇書見上注小之別十一曰玉筯秦小也李斯等作曰細篆亦斯摹始皇碑序字也曰仙人李斯改人書而作曰小漢武帝汾隂得鼎所作也曰薤葉曰垂露篆曰懸針並漢曹喜體喜小垂枝濃直名薤葉其書本古法商務光所作喜以小書之垂露篆以書章表謂其點綴如輕露之垂懸針以題五經篇目其勢有若針鋒王愔曰垂露書如懸針而勢不遒徑婀娜若濃露之垂懸針字必垂畫細末纎直如針曰纓絡漢劉德升觀星象而作曰柳葉晉衛瓘作曰翦刀魏韋誕作曰外國胡書阿馬鬼魅王之所授也其形似小此特其一耳若夫四海九州之外外國甚多言語殊俗其書亦異朝於中國或纍譯而後通則各自為體與小篆絶不侔矣𨽻之八分變而飛白行草隸書之別十三曰古隸程邈王次仲作曰今隸亦曰正書出於古隸鍾繇衛瓘習之頗有異體鍾繇謂之銘石羲獻復變新竒故別為今隸書謂之楷法而隸楷分矣曰八分王次仲作蔡雍述之蔡琰言臣父造八分書割程隸字八分取二分去李小二分取八分又曰皆似八字勢有偃波郭忠恕曰蔡雍以八體之後又分為此法蔡希悰曰王次仲以楷法局促更引而伸之為八字三分張懷瓘曰後學益務髙深漸若八字分散故曰八分鍾繇謂之章程書愚按程邈作隸王次仲廣之王次仲造八分蔡雍述之在秦漢時分隸已兼有矣隸法雖自秦始蓋取其簡易施之徒隸以便文書之用未有點畫俯仰之勢故此書終西京之世鼎彛碑碣皆罕用之東漢和帝時賈魴以隸字寫三蒼隸法始廣而八分兼行至蔡雍則銘刻多分書矣建初中以隸書為楷法本一書而二名鍾王變體始有古隸今隸之分則隸楷別為二書夫以古法為隸今法為楷可也隋唐以降古法盡廢遂指八分為古隸可乎今之言漢字者則謂之隸言唐字者則謂之分其書體則一不知何以為別蓋漢有隸分唐有分楷分之不可為隸猶楷之不可為分也程邈隸書法帖中有其迹西漢惟建平郫縣碑是隸古法學者觀之當自悟耳曰飛白蔡雍所作王隱王愔並云飛白巧法也本是宫殿題署勢既徑大文字且輕微不滿名為飛白王僧虔曰飛白八分之輕者蓋全用楷法古法飛少白多其體猶拘八分自梁蕭子雲變而飛多白少子雲又作小飛白嘗書蕭字於臺城佛舍唐張諗匣歸於洛命曰蕭齋又庾元威百體書中行草俱有飛白其書無傳至宋仁宗飛白秀蔚雄邁一還古法曰散隸晉衛恆祖述飛白而造開張隸體微露其白拘束於飛白蕭散於隸書宋蔡襄復作飛草亦曰散草極其精妙有風雲變化之勢曰神書晉太元中務章有女巫神降之能空中與人言多驗其書類飛白而不真筆勢遒徑莫能傳學或云仙人吳猛作也曰行書正之小變也後漢劉德升所作鍾繇謂之行狎務從簡易相間流行至王獻之又傍出二體非草非真離方遁圎處乎季孟之間兼真謂之真行帶行謂之行草虞世南云行草之迹如空中遊絲斷而復續又曰行書者若轉輪之義行而不滯曰龍瓜書王羲之遊天台還至會稽夕上洞庭題柱為一飛字有龍瓜之形後人因之遂稱龍瓜書曰虎瓜書王僧虔擬龍瓜而作以龍瓜形用縈婉似有流溺之患因加稜角為虎瓜之勢摯虞決録注云尚書臺召人用虎瓜書告下用偃波書皆不可卒學以防詐偽曰瑞華書見上注曰花草書河東山允所作曰雲霞書未詳所出曰反左書梁東宫學士孔敬通作當時坐上酬答無有識者庾元規見而識之遂呼為衆中清間法草書之别四曰章草史遊作又晉以後有鳯尾諾亦出於章草唐人不知所出有老僧善讀書太常博士嚴厚本問之僧云前代帝王各有僚吏箋啓上陳本府旨為可行是批鳯尾諾之意取其為羽族之長始於晉元帝批焉周越云元帝初執謙凡諸侯箋奏批之曰諾皆若字也按章草變法若字有尾故曰鳯尾諾曰一筆書張芝臨池所制其倚伏有循環之趣後世又有遊絲草者蓋此書之巧變也曰藁草晉魏瓘採張芝及父覬法而作蓋草書之帶行者亦相間書之或云起於屈原楚懷王令條國典因為藳草故取名耳又云董仲舒言災異藁草未上主父偃竊而奏之皆非也曰今草即二王所尚者按蔡希悰宋史作希綜蕭齋係唐李約事今作張諗未詳草本𨽻𨽻本篆篆出於籀籀始於古文皆體於自然殽法天地鄭肯亭包蒙曰書之由來尚矣韓詩以為自古封太山禪梁父者萬有餘家仲尼不能盡識而管子亦謂古封太山七十二家夷吾所識十有二焉嘗考太古之初為君長者以奉天事神為務而略於人事且風俗淳朴書契罕用有巢無懷事迹蓋亦難觀焉由此推之自蒼頡古文變而為隸八分行草皆形勢之相生天理之自然非出於一人之智雖朱蒼不能無所本况籀篆諸家乎然則於何取𠂻哉問書之變曰漢世逺步晉唐至宋滋弗逮矣指隸古八分而言也蒼夏之迹逺矣幣刀鼎鬲郎擊反世復寡傳蒼頡夏禹字見法帖歷代欵識諸刻幣刀古之泉貨也曰幣曰金曰刀曰布曰圜法等各有名勒其上若太昊氏金尊盧氏幣等見通志泉式等書鼎鬲者三代以前器用必有欵識或書銘以為戒盤盂尊彛之類皆是也湯之盤銘曰苟日新日日新又日新若武王諸器銘正考父鼎銘見經傳餘見博古圖贊皇石刻其非西周乎贊皇山有吉日癸巳四字穆天子傳云登贊皇以望臨城置壇此山癸巳志其日也慶歷中趙郡守鑿山取石龕於州廨宣和間詔移入禁中今觀其字畫新竒往往類近體兼其來歷他無所考獨於穆天子傳載之其不足據明矣詛楚其興於近代乎歐陽永叔曰秦祀巫咸神文今流俗謂之詛楚文者以其言楚王熊相之罪也史記世家楚自成王以後有熊疑熊良夫熊商熊槐熊元而無熊相詛文言穆公與成王盟好而後云倍十八世之詛盟則秦自穆公十八世為惠文王也又按秦本紀與楚世家自楚平王娶婦於秦其後纍世不以兵交至宣王熊良夫時秦始侵楚及惠文王時與楚懷王熊槐屢相攻伐則秦所詛者是懷王也但史記以為熊槐者失之爾槐相二字相近蓋轉寫之誤當從詛文石刻以相為正又有祀朝那湫文其文與此同趙德夫曰秦詛楚文余家所藏凡有三本其一祀巫咸舊在鳯翔府廨今歸御府此本是也其一祀大沈久湫藏於南京蔡氏其一祀亞駝藏於洛陽劉氏石鼓泰山碑暨於兩京遺書舊畫學者不可不懕於艷反觀焉石鼓世傳周宣王大搜於岐陽刻石作十鼓銘詩其上世謂之獵碣語是天五篇泰山碑按史記秦始皇東行郡縣上鄒嶧山立石與魯諸生議刻石頌秦德議封禪望祭山川乃遂上泰山立石封祠祀又作琅邪臺登之罘及東觀之碣石東上會稽咸刻石頌秦德凡六處七碑二世曰金石刻盡始皇帝所為也今襲號而金石刻不稱始皇帝其於久逺也知後嗣為之者不稱成功盛德李斯等請具刻二世詔書其旁以别之其文與皆斯筆蘇子瞻曰秦雖無道然所立有絶人者文字之工世亦莫及皆不可廢後有君子得以覽觀焉兩京東西漢也鄭夾漈曰方册者古人之語言欵識者古人之面貌三代而上惟勒鼎彛秦人始大其制而用石鼓始皇欲詳其文而用豐碑自秦迄今惟用石刻黃庭謂非右軍其誰作邪問黃庭經曰永僧徐浩輩亂之也按晉史王羲之性愛鵝山隂道士養白鵝羲之求市道士云為寫道德經當舉羣相贈羲之欣然寫畢籠鵝而歸虞和論書表亦言羲之為養鵝道士寫河上公老子而後世訛謬相承遂以為黃庭經蓋亦李太白送賀監詩誤云山隂道士如相見應寫黃庭換白鵝始也又按陶隱居與梁武帝啓云逸少有名之迹不過數首黃庭勸進告誓等不審猶有存否則右軍書黃庭自梁以來世已罕見矣張懷瓘書斷載羲之於山隂寫黃庭經初亦未嘗以為博鵝也永僧隋智永也羲之七世孫善楷書行草嘗於閣上臨書三十年業成方下求書者如市所居户限為之穿穴乃用鐡葉裹之退筆成冢徐浩字季海唐越州人為中書舍人善真行書撰古迹記樂毅論舊本希見於世宋初王侍書別寫混之樂毅論魏夏侯元著王右軍書之留意運工特盡神妙其間誤兩字不欲點除遂雌黃治定然後用筆嘗謂人曰我書樂毅論有君子之風寫道德經有神仙之態智永曰樂毅論正書第一梁世模出天下珍之自蕭子雲阮研之徒莫不臨學陳天嘉中有得其真迹以獻文帝後屬餘杭公主陳世諸王莫能求之唐太宗追尋纍載方得貞觀十二年奉勑出樂毅論真迹令直宏文館馮承素模賜長孫無忌房元齡髙士廉侯君集魏徴楊師道六人後安樂公主與朝貴分內庫圖書樂毅論太平公主得之常以織成錦袋盛置竹箱中及籍沒有咸陽老嫗竊於袖中州吏奔逐懼而投之竈下遂為灰燼世所傳有拓石本卷末列朱異沈熾文滿騫徐僧權押名及唐文皇手批勑字又周越家藏李後主拓本跋尾云太宗賜髙士廉并集賢院印與石本相類後失之又按髙紳嘗於秣陵井中得一石本先缺其一角所存三百餘字皇祜中紳之子安世為錢塘主薄石又斷缺末後獨有一海字或見其石以為元玉安世以火試之遂破為數假乃以鐡束之石蓋礎石堅瑩似玉而畏火安世死其子弟以石質錢於冨人家因失火遂焚其石或云尚存元祐間故郎官趙竦嘗挈石隨行已斷裂用木匣貯之又據沈存中云舊傳樂毅論乃羲之書丹於石其他皆紙素所傳唐太宗裒聚二王墨迹惟樂毅論是石本其後隨葬入昭陵朱梁時耀州節度使溫韜發昭陵得之復傳人間或云公主以偽本易之元不曽入壙宋朝藏髙紳學士家蓋石斷軼其半者字清徑有法後有重刻此本摹傳失真多矣其完美者全無古意王侍書名著善草隸尤工臨學諸書初翰林學士院自五代以來兵難相繼待詔以院體相傳字勢輕弱無法凡詔令碑刻皆不足觀宋太宗留心翰墨摹求善書許自言於公車置御書院選善書者七人補翰林待詔各賜緋魚袋錢十萬並兼御書院祇候更配宿兩院餘者以次補外自是內署書詔筆體一變燦然可觀首得蜀人王著即召為御書院祗候遷翰林侍書後官至殿中侍御史賜金紫洛神賦亦後人託獻之而間行之洛神賦魏曹植作有小楷石本行於世相傳為王獻之書獻之字子敬羲之季子為晉中書令工草隸八分飛白墓田丙舍其鍾太尉之懿乎墓田丙舍帖鍾繇書今見於世者臨本也霜寒數帖其王會稽之奧乎陶隱居曰逸少自吳興以前諸書猶未為稱從失郡告靈不仕以後略不復自書皆從史一人代筆世人不能别見其緩異呼為末年書逸少沒後子敬年十七八全放此人書故遂與此人相似凡厥好迹皆向會稽永和十許年中者霜寒帖右軍書也李陽氷庶子泉銘怡亭石刻二世詔無是過也庶子泉銘李陽氷撰并書在滁州其泉昔為溪流後為山僧填為平地架屋於上今存者一大井爾怡亭在武昌江水中小島上武昌人謂其地為吳王散花灘亭裴鶠造李陽氷銘而篆之裴虬銘李莒八分書刻於島石常為江水所沒故世罕傳二世詔見上注浯溪碑雅厚雄深森嚴於瘞鶴萬安記其裔苗乎浯溪碑在永州祁陽縣唐安祿山反明皇幸蜀肅宗中興元結撰頌顔真卿書磨崖石而刻之瘞鶴銘題云華陽真逸撰在焦山之足常為江水所沒好事者伺水退而摹之往往祇得其數句潤州圖經以為王羲之書或曰華陽真逸顧况號也蔡君謨曰瘞鶴文非逸少字東漢末多善書唯隸最盛至於晉魏之分南北差異鍾王楷法為世所尚元魏間盡習隸法自隋平陳中國多以楷隸相參瘞鶴文有楷隸筆當隋代書曹士冕曰焦山瘞鶴銘筆法之妙為書家冠冕前輩慕其字而不知其人或以為逸少或以為顧况最後雲林子以為華陽隱居陶宏景及以句曲所隱居朱陽館帖參校然後衆疑釋然長睿之鑒賞可謂精矣萬安記泉州洛陽橋碑也橋在城東二十里其長三千六百尺名曰萬安渡石橋皇祐五年蔡襄造為文自書以紀之郎官廳壁序祭濠州文末年告身同出一軌郎官廰壁序朝散大夫行右司貟外郎陳九言撰吳郡張旭書在長安唐尚書省郎官廰開元二十九年十月戊寅建祭濠州文顔真卿祭其伯父顔元孫之文也元孫為濠州刺史嘗撰干祿字書魯公書之末年告身建中元年八月告光祿大夫太子少師充禮儀使上柱國魯郡開國公顔真卿勑也公自書所謂不約於法而允蹈焉者一掃歐虞褚薛之疲苶奴愒反其議論具古學篇歐陽詢字信本官至太子率更令太常少卿宏文館學士渤海男虞世南字伯施官至祕書監永興縣子宏文館學士諡文懿褚遂良字登善官至尚書右僕射河南縣公薛稷字嗣華官至太子少保禮部尚書皆唐人工楷隸行草歐陽兼善八分飛白撰轉授訣虞著筆髓六篇張顔疇宗與問張旭顔真卿曰宗古文籀篆其開於程蔡乎張顔謂楷法程蔡謂隸八分夫六書之微非古文籀篆無宗主八法之妙非程隸蔡分莫能發明自古法變而趨今學者往往文滅其質矣夾漈曰古文變而為籀籀變而隸秦漢之人習篆隸必試以籀書者恐失其原也程蔡程邈蔡雍也石室之書今亡矣石室書見上篇注蓋惜其無傳也其幸存而未泯者獨蔡氏之言爾其言曰書肇於自然隂陽生焉形勢立焉勢來不可止勢去不可遏蔡琰曰臣父造八分時恍然一客曰吾授汝筆法言訖而沒曰書肇於自然自然既立隂陽生焉隂陽既生形勢出矣藏頭護尾力在字中下筆用力肌膚之麗故曰勢來不可止勢去不可遏書有二法一曰疾二曰澀二法書妙盡矣夫書稟乎人性疾者不可使之令徐徐者不可使之令疾筆惟軟則竒怪生焉隂陽者結字點畫上皆覆下下以承上遞相映帶無使反背轉筆左旋右顧無使筯節孤露藏鋒點畫出入之迹欲左先右至回左亦爾護尾點畫勢盡用力收之疾勢出於啄磔之中又在竪筆緊躍之內掠筆在於趲鋒峻躍用之澀勢在於緊駃戰行之法橫鱗竪勒之規九勢得後自然無師授而合於先聖按此注原本訛字甚多今從蔡雍九勢原文改正若日月雲霧若蟲食葉若利刀戈縱橫皆有意象蔡雍筆論曰書者散也欲書先舒散懷抱任情恣性次須正坐靜思隨意取擬字體形勢若坐若行若飛若動若往若來若卧若起若愁若喜若春夏秋冬形若蟲食木若利刀戈若強努之末若水火若雲霧若日月縱橫有象可謂書矣左回右顧無使孤露藏頭護尾力在字中見上注疾澀之分執筆之度八體變法之元䆞烏呌反今世傳蔡氏所授法曰虛掌實指腕平筆直疾磔暗收遣筆隂陽勢出永字八法夫側筆者左揭腕簇鋒著紙為遲澀廽筆覆蹤是峻疾勒筆者鱗華右行為遲澀廽筆左勒是峻疾努筆者搶鋒逆上頓挫為遲澀努鋒下行是峻疾躍筆者蹲鋒於努畫中紐挫取勢為遲澀得勢險激左出是峻疾策筆者搶鋒向上為遲澀左揭腕而掠是峻疾一云䇿筆者搶鋒向左為遲澀廽筆仰䇿是峻疾掠筆闕啄筆者左卧筆挫鋒向右為遲澀右揭腕左罨是峻疾磔筆者緊䟐戰行為遲澀勢磔掣右出是峻疾故峻疾為陽遲澀為隂禁經云八法起於隸字之始自崔張鍾王傳授所用墨道之最不可不明也隋僧智永發其旨趣授於虞世南按䆞字原本訛作䆞今改正闕五音篇海同闕崔瑗之書髙眀粹精非魏晉所擬議崔瑗字子玉駰子也早孤好學明天官歷數善章草師杜伯度作草書勢法尤妙有河問相張衡碑及缶座右銘子實能傳其業唐李陽冰深得其理按缶字疑有誤籀𨽻與篆同筆意異篆貴圎隸貴方八法不同而六書則同篆用直分用側用筆有異而執筆無異蕭相國張留侯談筆道鍾太傅著論可為格言矣蕭張論筆道略曰筆者意也書者骨也力也通也塞也決也鍾太傅筆骨論略曰筆迹者界也流美者人也相國名何封鄼侯嘗作一鼎以表已功自大書之又最善於題署隸古留侯名良字子房西漢人太傅元常也諸葛武侯其知書之變矣武侯名亮字孔明為漢相先主作三鼎皆亮隸八分書極其工妙今帖中有元莫大寂混合隂陽等字其子瞻亦能書揚子雲訓纂其説文切韻之本乎揚子雲名雄西漢成都人四十為郎三世不遷終於大夫善古文識竒字自昔伏犧命子襄作六書而黃帝復命蒼頡制文字下及唐虞三代通謂古文至周宣王太史籀始著大篆十五篇損益古文或同或異所謂竒字也古人之書殊文者多矣有古今殊文者有一代殊文者有諸國殊文者劇乎春秋戰國之世文字異同各隨所習秦兼天下丞相李斯乃奏罷其不合秦文者強而同之遂作蒼頡篇九章中車府令趙髙作爰歷篇六章太史胡母敬作博學篇七章皆取籀書或頗省改所謂小者也屬秦政滋繁人趨簡易程邈復變小為隸書三千字而王次仲實增廣之於是古文廢而不用漢興有李書師合小三篇書之總謂之蒼頡篇斷六十字為一章凡五十五章以教於鄉里孝宣時始命諸儒修蒼頡之學召通蒼頡讀者張敞從而受之涼州刺史杜鄴沛人爰禮講學大夫秦近亦能言之孝平時召禮等百餘人令説文字未央宫中以禮為小學元士雄時為黃門侍郎採以作訓纂篇凡三十四章又易蒼頡重復之字為八十九章東漢班固續訓纂作十三章通一百二章凡六千一百二十字無復者用訓纂之末以為篇目曰滂喜和帝時郎中賈魴用隸字寫之以蒼頡為上篇訓纂為中篇滂喜為下篇謂之三蒼隸書浸廣而籀篆轉微矣三蒼之書其辭質其義古不類偏旁亦不類四聲未有反音亦未有訓詁至杜林始作蒼頡訓詁晉郭璞又作三蒼訓詁非若説文之自為注也説文者漢太尉祭酒汝南許慎所作也初和帝命侍中賈逵修理舊文於是慎乃集三蒼爾雅之學考之於逵作説文解字十四篇并序目一卷凡萬六百餘字取其形類作偏旁條例首一終亥各有部居包括六藝羣書之詁評釋百氏諸子之訓天地山川草木鳥獸昆蟲雜物竒怪珍異王制禮儀世間人事靡不畢集安帝十五年始奏上之魏博士清河張揖著埤蒼廣雅古今字詁綴拾遺漏增益字類頗為有補然方之許篇古今體用或得或失説文之作訓詁雖備未有反切晉世義陽王典祠令吕忱表上字林五篇萬二千八百餘字附託説文而按偶章向隱别古籀竒惑之字唐大歷中李陽冰迹殊絶獨冠古今於是刋定説文自為新義陽冰之後諸儒箋述甚衆附益反切互有異同至宋徐鉉受詔校定為之集注增以已見定其音切愈密矣切韻之學起自江左述作頗衆惟陸法言書盛行於世以平上去入四聲為次凡二百六韻諸儒增注至數萬餘言邵堯夫曰韻法開闢者律天清濁者吕地先閉後開者春也純開者夏也先開後閉者秋也冬則閉而無聲東為春聲陽為夏聲此見作韻者亦有所主也銜凡冬聲也又有唐李騰説文字源宋徐鍇韻譜通釋等書皆説文切韻之羽翼也大抵字書則主偏旁韻書則主四聲豈若夾漈氏六書七音之精詳焉故其言曰五略漢唐諸儒所得而聞也十五略漢唐諸儒所不得而聞也回溪書衡肯亭包蒙其義則衍極竊取之矣回溪姓鄭名僑字惠叔宋興化人乾道五年狀元及第淳熙間使金國不屈官至參知政事知樞密院時韓托胄當國禁錮道學朱文公被黜公奏留之寧宗出御筆諭臺諫給舍不必更及舊事托胄及其黨與皆怒力陳以為不可上旨中變公獨以反汗爭之乞身而歸遂以觀文殿學士致仕封蜀國公年七十一薨於家贈太師郇國公諡忠惠肯亭名寅字子敬公之子也博極羣書考夾漈通志訛失又集為通志大旨鏤板於廬陵郡齋校司馬公稽古録刋於興化學宮仕至尚書左司兼權樞密副都承旨出知漳州以疾自陳除直寶章閣致仕命未下卒於官回溪善行草著書衡三篇其略曰夫三代銘刻鼎匜古文舊或移之上下左右隨體變轉雖略有工拙而要以心會其妙非若後世之拘限也又曰漢石經諸刻多以隸體八分而夏淳於碑乃用體八分又曰鍾張以前多是隸古意二王後而隸古微矣又曰唐人云字裏金生行間玉潤真則字終意不終草則行盡勢不盡其得書之趣矣凡此議論數十條深有理致肯亭作包蒙七卷其略曰古人立言皆有所本揚雄太元所以擬易也其法以一元都覆三方方同九州枝載庶部分正羣家實得先天自然之學及觀博古書所載商卣卦象則與揚雄凖首相合乃知古有其卦按周官太卜掌三易一曰連山二曰歸藏三曰周易其經卦皆八其别皆六十有四鄭康成引杜子春注云連山伏羲歸藏黃帝三墳則以連山為伏羲歸藏為神農而黃帝則有坤乾之易世傳夏曰連山商曰歸藏非與夏易不可得而見竊疑商易則卦象卣欵識者是也豈以二畫而成卦故其經卦皆九其别則八十有一而後人失其傅矣若關朗洞極則取揚氏之元而殺其一畫焉夫伏羲之八卦皆當時之古文也然則卣之欵識恐亦商之古文爾謂之卦象卣則後人取名也又曰三皇尚忠五帝尚質三王尚文八卦忠也古文質也籀文也篆則王降而霸矣隸其秦之法令書乎古隸隸之古文也八分隸之籀也楷法隸之也飛白八分之流也行楷之行也草楷之走也隸以規為方草則圎其矩而六書之道散矣又曰古者天子籍田祭先農王后親桑享先蠶示不忘也六書之學興於蒼頡當宇文之初冀雋請按春秋二仲上丁釋奠於先聖先師禮以釋奠蒼頡誠得古人之遺意也夫太公以兵家者流唐之祭典且得與文宣王比况蒼頡之造書乎肯亭子經之曽祖父也戴侗六書故辭理荒謬蓋有不知而作之者矣夫古之有作者極其精微闡其楗機合其天儀豈徒作哉其不思之甚矣荀子曰古好書者衆矣而蒼頡獨傳者一也好稼者衆矣而后稷獨傳者一也好義者衆矣而舜獨傳者一也自古及今未有兩而能精者也戴侗者自號合溪宋溫州永嘉縣南溪人汪季路小端明之甥也列官於朝出尹台州其父蒙從學於武夷兄仔蓋父子弟弟自為師友以成其書凡二十四卷通二十册延祐庚申冬重鏤板於學宫侗之言曰豫為六書三十年而未卒功竊觀其書多掇托前人字義雜説又不采其英華者間有出其胸臆率皆煩拏澆淺又集用古字真所謂以溪嶮之字雜紕繆之説者也凡説字義切韻之書漢唐以來不為不少豈侗皆未之見耶又無明師畏友而區區以諛聞陋識牽合附會徒費嵗月又曰因許氏之遺文訂其得失今觀其所學如此而欲訂正許氏説文甚哉侗之餮饜無耻也蓋古之述作者皆素有負抱於其中特假書焉以通其意而其道妙有書不能盡焉者使人讀之優柔嘆咏有得於文字之外衍極之為説揚今榷古溫純精邃學之者要須反覆沉潛尋其管鍵然後可知其理以臻其極也禮論曰夔達於樂而不達於禮是以傳於此名也亦荀子之説也先天庖犧氏乾象鑿度媧皇大庭氏地靈諸經公孫軒轅氏闢其文籀尤極於古庖犧乾象鑿度蒼頡修為二篇周易繫辭倣佛其文女媧有地靈經易靈經諸書繼有大庭氏史皇氏軒轅演古籀文至周柱下史作籀書亦本此意請問古質而今繁新巧而古拙其如何哉曰余獨未見新巧而古拙也傳不云乎釋儀的而妄發者雖中亦不為巧矣夫質而不文行而不逺周鼎著倕俾銜其指以示大巧之不可為也極而已矣韓非子曰釋儀的而妄發雖中亦不巧矣釋法制而妄怒雖殺戮而姦人亦不恐矣倕唐堯時巧斫者此答上文意謂古雖質而實文冝其行於久也又何嘗見有新巧者極者中也其上下極字不與此同説夫字有九德九德則法法始乎庖羲成乎軒頡盛乎三代革乎秦漢極乎晉唐萬世相因體有損益而九德莫之有損益也或曰九德孰傳乎曰天傳之又問自得曰無愧於心為自得九德出虞書苟枵然於其中而忘用者吾恐悲藤寃碑之復作也唐人用剡溪藤以造紙舒元與傷時人之妄用故作悲藤文顔魯公得竒石逺致於江州造祖亭為文書丹刻而竪焉後為本州吏修九江驛遂移此碑剗去舊作而著已之微勞識者痛恨莆田歐陽詹為文以弔之曰石不能言豈無其寃
